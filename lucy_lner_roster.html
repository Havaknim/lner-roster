<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #f0f2f5;
    min-height: 100vh;
    display: flex;
    align-items: flex-start;
    justify-content: center;
    padding: 2rem 1rem;
    color: #1a1a2e;
  }
  .container { width: 100%; max-width: 420px; }
  h1 { font-size: 22px; font-weight: 600; color: #1a1a2e; margin-bottom: 1.25rem; text-align: center; letter-spacing: -0.3px; }
  .cal-card { background: #fff; border-radius: 16px; padding: 1.25rem; box-shadow: 0 2px 12px rgba(0,0,0,0.08); margin-bottom: 1rem; }
  .cal-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1rem; }
  .cal-header h2 { font-size: 16px; font-weight: 600; color: #1a1a2e; }
  .nav-btn { width: 32px; height: 32px; border: none; background: #f0f2f5; border-radius: 8px; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 16px; color: #555; transition: background 0.15s; }
  .nav-btn:hover { background: #e0e3e8; }
  .cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 3px; }
  .day-label { text-align: center; font-size: 12px; font-weight: 500; color: #999; padding: 4px 0 8px; }
  .day-cell { aspect-ratio: 1; display: flex; align-items: center; justify-content: center; font-size: 13px; border-radius: 8px; cursor: pointer; color: #1a1a2e; transition: background 0.12s; position: relative; }
  .day-cell:hover:not(.empty):not(.out-range) { background: #f0f2f5; }
  .day-cell.empty, .day-cell.out-range { cursor: default; color: #ddd; }
  .day-cell.selected { background: #6c5ce7; color: #fff !important; font-weight: 600; }
  .day-cell.today:not(.selected)::after { content: ''; position: absolute; bottom: 3px; left: 50%; transform: translateX(-50%); width: 4px; height: 4px; border-radius: 50%; background: #6c5ce7; }
  .day-cell.rest-day:not(.selected):not(.out-range) { color: #e17055; }
  .result-card { background: #fff; border-radius: 16px; padding: 1.25rem; box-shadow: 0 2px 12px rgba(0,0,0,0.08); min-height: 80px; }
  .result-date-title { font-size: 15px; font-weight: 600; color: #1a1a2e; margin-bottom: 1rem; display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
  .wk-badge { font-size: 11px; background: #ede9ff; color: #6c5ce7; border-radius: 20px; padding: 2px 10px; font-weight: 500; }
  .metrics { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 1rem; }
  .metric { background: #f7f8fa; border-radius: 10px; padding: 10px 12px; }
  .metric-label { font-size: 11px; color: #999; margin-bottom: 3px; }
  .metric-value { font-size: 18px; font-weight: 600; color: #1a1a2e; }
  .metric-value.small { font-size: 14px; }
  .rest-day-block { background: #f7f8fa; border-radius: 10px; padding: 12px; text-align: center; color: #e17055; font-size: 15px; margin-bottom: 1rem; }
  .adj-section { border-top: 1px solid #f0f2f5; padding-top: 1rem; display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
  .adj-card { background: #f7f8fa; border-radius: 10px; padding: 10px 12px; }
  .adj-title { font-size: 10px; text-transform: uppercase; letter-spacing: 0.06em; color: #bbb; margin-bottom: 4px; }
  .adj-day-name { font-size: 12px; color: #999; margin-bottom: 2px; }
  .adj-turn { font-size: 14px; font-weight: 600; color: #1a1a2e; margin-bottom: 1px; }
  .adj-times { font-size: 12px; color: #999; }
  .adj-rd { font-size: 13px; color: #e17055; }
  .placeholder { color: #bbb; font-size: 14px; text-align: center; padding: 0.5rem 0; }
</style>
</head>

const MONTHS = ["January","February","March","April","May","June","July","August","September","October","November","December"];
const DAY_LABELS = ["Su","Mo","Tu","We","Th","Fr","Sa"];

function pad(n){return String(n).padStart(2,'0');}
function offsetKey(key,delta){const d=new Date(key+'T00:00:00');d.setDate(d.getDate()+delta);return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`;}

const _now = new Date();
let viewYear = _now.getFullYear(), viewMonth = _now.getMonth(), selectedKey = null;

function renderCalendar() {
  document.getElementById('month-label').textContent = `${MONTHS[viewMonth]} ${viewYear}`;
  const grid = document.getElementById('cal-grid');
  grid.innerHTML = '';
  DAY_LABELS.forEach(l => { const el = document.createElement('div'); el.className = 'day-label'; el.textContent = l; grid.appendChild(el); });
  const firstDay = new Date(viewYear, viewMonth, 1).getDay();
  const daysInMonth = new Date(viewYear, viewMonth + 1, 0).getDate();
  for (let i = 0; i < firstDay; i++) { const el = document.createElement('div'); el.className = 'day-cell empty'; grid.appendChild(el); }
  const today = new Date();
  const todayKey = `${today.getFullYear()}-${pad(today.getMonth()+1)}-${pad(today.getDate())}`;
  for (let d = 1; d <= daysInMonth; d++) {
    const k = `${viewYear}-${pad(viewMonth+1)}-${pad(d)}`;
    const el = document.createElement('div');
    el.textContent = d;
    const entry = ROSTER_RAW[k];
    const isRD = !entry || !entry.start;
    let cls = 'day-cell';
    if (!entry) cls += ' out-range';
    else if (isRD) cls += ' rest-day';
    if (k === selectedKey) cls += ' selected';
    if (k === todayKey) cls += ' today';
    el.className = cls;
    if (entry) { el.addEventListener('click', () => { selectedKey = k; renderCalendar(); renderResult(); }); }
    grid.appendChild(el);
  }
}

function adjHTML(label, key) {
  const entry = ROSTER_RAW[key];
  const dt = new Date(key + 'T00:00:00');
  const dayName = dt.toLocaleDateString('en-GB', {weekday:'long'});
  const dispDate = dt.toLocaleDateString('en-GB', {day:'numeric', month:'short'});
  if (!entry) return `<div class="adj-card"><p class="adj-title">${label}</p><p class="adj-day-name">${dayName} ${dispDate}</p><p class="adj-rd">Outside roster</p></div>`;
  const isRD = !entry.start;
  return `<div class="adj-card"><p class="adj-title">${label}</p><p class="adj-day-name">${dayName} ${dispDate}</p>${isRD ? `<p class="adj-rd">Rest day</p>` : `<p class="adj-turn">${entry.turn}</p><p class="adj-times">${entry.start} – ${entry.end} · ${entry.length}</p>`}</div>`;
}

function renderResult() {
  const rc = document.getElementById('result-card');
  if (!selectedKey) { rc.innerHTML = '<p class="placeholder">Select a date to view shift details.</p>'; return; }
  const entry = ROSTER_RAW[selectedKey];
  if (!entry) { rc.innerHTML = '<p class="placeholder">Date not in roster.</p>'; return; }
  const dt = new Date(selectedKey + 'T00:00:00');
  const dayName = dt.toLocaleDateString('en-GB', {weekday:'long'});
  const dispDate = dt.toLocaleDateString('en-GB', {day:'numeric', month:'long', year:'numeric'});
  const isRD = !entry.start;
  const prevKey = offsetKey(selectedKey, -1);
  const nextKey = offsetKey(selectedKey, 1);
  rc.innerHTML = `<div class="result-date-title">${dayName}, ${dispDate}<span class="wk-badge">Week ${entry.wk}</span></div>${isRD ? `<div class="rest-day-block">Rest day</div>` : `<div class="metrics"><div class="metric"><p class="metric-label">Start</p><p class="metric-value">${entry.start}</p></div><div class="metric"><p class="metric-label">Finish</p><p class="metric-value">${entry.end}</p></div><div class="metric"><p class="metric-label">Turn</p><p class="metric-value${entry.turn.length>8?' small':''}">${entry.turn}</p></div><div class="metric"><p class="metric-label">Length</p><p class="metric-value">${entry.length}</p></div></div>`}<div class="adj-section">${adjHTML('Day before', prevKey)}${adjHTML('Day after', nextKey)}</div>`;
}

document.getElementById('prev-btn').addEventListener('click', () => { viewMonth--; if (viewMonth < 0) { viewMonth = 11; viewYear--; } renderCalendar(); });
document.getElementById('next-btn').addEventListener('click', () => { viewMonth++; if (viewMonth > 11) { viewMonth = 0; viewYear++; } renderCalendar(); });
renderCalendar(); renderResult();
</script>
